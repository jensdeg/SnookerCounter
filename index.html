<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CueSports Game Tracker</title>
    <link rel="icon" href="/icon.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/button.css">
    <link rel="stylesheet" href="css/wins.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="fullscreenlogic/fullscreenbutton.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  </head>

  <body>
    <nav class="tab">
      <button class="tab-button" data-tab="Games"><b>Games</b></button>
      <button class="tab-button" data-tab="Snooker"><b>Snooker</b></button>
      <button class="tab-button" data-tab="Log"><b>Log</b></button>
    </nav>
    <div class="tabdivider"></div>
    <div>
      <button id="fullscreen-button" aria-label="Toggle Fullscreen">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"></path>
      </svg>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"></path>
      </svg>
    </button>
    <button id="settings-button" aria-label="Toggle Settings Overlay">
      <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="40" height="40" viewBox="0 0 50 50">
        <path d="M47.16,21.221l-5.91-0.966c-0.346-1.186-0.819-2.326-1.411-3.405l3.45-4.917c0.279-0.397,0.231-0.938-0.112-1.282 l-3.889-3.887c-0.347-0.346-0.893-0.391-1.291-0.104l-4.843,3.481c-1.089-0.602-2.239-1.08-3.432-1.427l-1.031-5.886 C28.607,2.35,28.192,2,27.706,2h-5.5c-0.49,0-0.908,0.355-0.987,0.839l-0.956,5.854c-1.2,0.345-2.352,0.818-3.437,1.412l-4.83-3.45 c-0.399-0.285-0.942-0.239-1.289,0.106L6.82,10.648c-0.343,0.343-0.391,0.883-0.112,1.28l3.399,4.863 c-0.605,1.095-1.087,2.254-1.438,3.46l-5.831,0.971c-0.482,0.08-0.836,0.498-0.836,0.986v5.5c0,0.485,0.348,0.9,0.825,0.985 l5.831,1.034c0.349,1.203,0.831,2.362,1.438,3.46l-3.441,4.813c-0.284,0.397-0.239,0.942,0.106,1.289l3.888,3.891 c0.343,0.343,0.884,0.391,1.281,0.112l4.87-3.411c1.093,0.601,2.248,1.078,3.445,1.424l0.976,5.861C21.3,47.647,21.717,48,22.206,48 h5.5c0.485,0,0.9-0.348,0.984-0.825l1.045-5.89c1.199-0.353,2.348-0.833,3.43-1.435l4.905,3.441 c0.398,0.281,0.938,0.232,1.282-0.111l3.888-3.891c0.346-0.347,0.391-0.894,0.104-1.292l-3.498-4.857 c0.593-1.08,1.064-2.222,1.407-3.408l5.918-1.039c0.479-0.084,0.827-0.5,0.827-0.985v-5.5C47.999,21.718,47.644,21.3,47.16,21.221z M25,32c-3.866,0-7-3.134-7-7c0-3.866,3.134-7,7-7s7,3.134,7,7C32,28.866,28.866,32,25,32z"></path>
      </svg>    
    </button>
    </div>
    

    <main id="Games">
      <div class="player-names">
        <table cellspacing="0" cellpadding="0" width="100%">
          <tr>
            <td id="player1-name" style="width: 30%;">player 1</td>
            <td style="width: 25%;">-</td>
            <td id="player2-name" style="width: 30%;">player 2</td>
          </tr>
        </table>
      </div>

      <div class="game" id="9BallGame">
        <h1 class="game-title">9 Ball</h1>
        <hr>
        <div class="win-container">
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player1">0</div>
          <button class="win-button" value="-1">&#8722;</button>
          <div class="divider">-</div>
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player2">1</div>
          <button class="win-button" value="-1">&#8722;</button>
        </div>
      </div>

      <div class="game" id="8BallGame">
        <h1 class="game-title">8 Ball</h1>
        <hr>
        <div class="win-container">
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player1">0</div>
          <button class="win-button" value="-1">&#8722;</button>
          <div class="divider">-</div>
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player2">1</div>
          <button class="win-button" value="-1">&#8722;</button>
        </div>
      </div>

      <div class="game" id="SnookerGame">
        <h1 class="game-title">Snooker</h1>
        <hr>
        <div class="win-container" id="snooker-win-container">
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player1">0</div>
          <button class="win-button" value="-1">&#8722;</button>
          <div class="divider">-</div>
          <button class="win-button" value="1">&#43;</button>
          <div class="win-count" id="player2">1</div>
          <button class="win-button" value="-1">&#8722;</button>
        </div>
      </div>
      <div style="display: flex; justify-content: center; gap: 1ch; margin-top: -1.5ch;">
        <button id="log-wins" class="reset-button" style="background-color: rgba(101, 233, 116, 0.591)";>Save</button>
        <button id="reset-wins" class="reset-button" style="background-color: rgba(255, 139, 139, 0.717);">Reset</button>
      </div>
      <br>
    </main>

    <section id="Snooker">
      <section class="score-window">
        <input type="text" class="name" placeholder="Player 1" id="Player1">
        <p class="score" id="Player1Score">0</p>

        <div class="buttons">
          <button class="ball-button red">1</button>
          <button class="ball-button yellow">2</button>
          <button class="ball-button green">3</button>
          <button class="ball-button brown">4</button>
          <button class="ball-button blue">5</button>
          <button class="ball-button pink">6</button>
          <button class="ball-button black">7</button>
        </div>

        <div class="reset-buttons">
          <button class="clear-button">-1</button>
          <button class="clear-button">Reset</button>
        </div>
      </section>

      <section class="snooker-divider">
        <div style="width: 75%; height: auto;"></div>
        <div style="width: 12%; height: auto;" class="snooker-score-diff" id="difference"></div>
        <div style="width: 15%; height: auto"></div>
      </section>

      <section class="score-window">
        <input type="text" class="name" placeholder="Player 2" id="Player2">
        <p class="score" id="Player2Score">0</p>

        <div class="buttons">
          <button class="ball-button red">1</button>
          <button class="ball-button yellow">2</button>
          <button class="ball-button green">3</button>
          <button class="ball-button brown">4</button>
          <button class="ball-button blue">5</button>
          <button class="ball-button pink">6</button>
          <button class="ball-button black">7</button>
        </div>

        <div class="reset-buttons">
          <button class="clear-button">-1</button>
          <button class="clear-button">Reset</button>
        </div>
      </section>
      <div style="display: flex; justify-content: center; gap: 1ch; margin-top: -1.5ch;">
        <button id="End-Game" class="reset-button">End Game</button>
      </div>
    </section>

    <section id="Log" class="Log-Page">
      <h1>Matches</h1>
      <div id="match-log-container" class="match-log-container"></div>
      <div class="buttons">
        <button class="download-button" id="download">download</button>
        <label for="MatchLogFile" class="import-button">Import</label>
        <input type="file" id="MatchLogFile" accept=".json"></input>
      </div>
    </section>

    <section id="Settings" class="SettingOverlay" style="display: none;">
      <div class="Settings">
        <input type="checkbox" id="ScheduleSetting" name="Schedule" value="False">
        <label for="ScheduleSetting"> Enable Schedule</label><br>
      </div>
    </section>

    <script src="js/settings.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/wins.js"></script>
    <script src="js/snooker.js"></script>
    <script src="js/persistence/Match.js"></script>
    <script src="js/persistence/db.js"></script>
    <script src="fullscreenlogic/fullscreenbutton.js"></script>
  </body>
</html>
